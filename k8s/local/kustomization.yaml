apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: phase3

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - rbac.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - frontend-hpa.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - backend-hpa.yaml
  - postgres-statefulset.yaml
  - postgres-service.yaml
  - ingress.yaml
  - networkpolicy.yaml

commonLabels:
  app.kubernetes.io/name: phase3-todo-chatbot
  app.kubernetes.io/instance: phase3-local
  app.kubernetes.io/version: "1.0.0"
