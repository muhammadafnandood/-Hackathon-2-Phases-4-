apiVersion: v1
kind: Secret
metadata:
  name: phase3-secrets
  namespace: phase3
type: Opaque
stringData:
  # Database Credentials
  POSTGRES_USER: "phase3user"
  POSTGRES_PASSWORD: "phase3password123"
  POSTGRES_DB: "todoapp"
  
  # Database Connection String
  DATABASE_URL: "postgresql://phase3user:phase3password123@postgres-service:5432/todoapp?sslmode=disable"
  
  # Authentication
  BETTER_AUTH_SECRET: "minikube_dev_secret_key_change_in_production"
  
  # OpenAI API Key (optional - leave empty for local)
  OPENAI_API_KEY: ""
