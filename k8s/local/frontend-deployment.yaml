apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: phase3
  labels:
    app: frontend
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      serviceAccountName: phase3-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: frontend
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          image: phase3-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: phase3-config
                  key: FRONTEND_NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: phase3-config
                  key: FRONTEND_PORT
            - name: NEXT_PUBLIC_API_URL
              value: "http://backend-service:8080/api/v1"
            - name: NEXT_PUBLIC_BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: phase3-secrets
                  key: BETTER_AUTH_SECRET
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
