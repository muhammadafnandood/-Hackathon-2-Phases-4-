apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "phase3.fullname" . }}-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "phase3.labels" . | nindent 4 }}
data:
  # Frontend Configuration
  FRONTEND_NODE_ENV: {{ .Values.frontend.env.NODE_ENV | quote }}
  FRONTEND_PORT: {{ .Values.frontend.service.targetPort | quote }}
  
  # Backend Configuration
  BACKEND_PYTHON_ENV: {{ .Values.backend.env.PYTHON_ENV | quote }}
  BACKEND_LOG_LEVEL: {{ .Values.backend.env.LOG_LEVEL | quote }}
  BACKEND_PORT: {{ .Values.backend.service.targetPort | quote }}
  
  # Database Configuration
  POSTGRES_HOST: {{ include "phase3.fullname" . }}-postgresql
  POSTGRES_PORT: {{ .Values.postgresql.service.targetPort | quote }}
  POSTGRES_DB: {{ .Values.secrets.postgresDB | quote }}
  
  # Service URLs
  FRONTEND_SERVICE_URL: "http://{{ include "phase3.fullname" . }}-frontend:{{ .Values.frontend.service.port }}"
  BACKEND_SERVICE_URL: "http://{{ include "phase3.fullname" . }}-backend:{{ .Values.backend.service.port }}"
