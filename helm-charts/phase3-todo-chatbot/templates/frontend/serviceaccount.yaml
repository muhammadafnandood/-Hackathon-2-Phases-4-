{{- if and .Values.frontend.enabled .Values.rbac.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "phase3.serviceAccountName" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "phase3.labels" . | nindent 4 }}
  {{- with .Values.rbac.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
