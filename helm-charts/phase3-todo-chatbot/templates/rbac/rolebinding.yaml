{{- if .Values.rbac.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "phase3.fullname" . }}-role
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "phase3.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "phase3.fullname" . }}-rolebinding
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "phase3.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "phase3.serviceAccountName" . }}
    namespace: {{ .Values.global.namespace }}
roleRef:
  kind: Role
  name: {{ include "phase3.fullname" . }}-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}
