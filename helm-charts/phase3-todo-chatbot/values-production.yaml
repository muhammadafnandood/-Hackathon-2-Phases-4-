# Production-specific values for phase3-todo-chatbot
# Hardened configuration for production deployments

global:
  namespace: phase3-production
  imageRegistry: "docker.io/your-registry"
  storageClass: "gp3"

# Frontend - Production hardened
frontend:
  replicaCount: 3
  image:
    tag: "v1.0.0"
    pullPolicy: Always
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 70
  podDisruptionBudget:
    enabled: true
    minAvailable: 2

# Backend - Production hardened
backend:
  replicaCount: 3
  image:
    tag: "v1.0.0"
    pullPolicy: Always
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 30
    targetCPUUtilizationPercentage: 50
    targetMemoryUtilizationPercentage: 65
  podDisruptionBudget:
    enabled: true
    minAvailable: 2

# PostgreSQL - Production hardened
postgresql:
  replicaCount: 1
  image:
    tag: "15-alpine"
    pullPolicy: Always
  resources:
    requests:
      memory: "1Gi"
      cpu: "1000m"
    limits:
      memory: "4Gi"
      cpu: "4000m"
  persistence:
    enabled: true
    size: 20Gi
    storageClass: "gp3"
  podDisruptionBudget:
    enabled: false

# Ingress - Production with TLS
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
  hosts:
    - host: todo-app.example.com
      paths:
        - path: /api(/|$)(.*)
          pathType: ImplementationSpecific
          backend:
            service:
              name: backend
              port: 8080
        - path: /()(.*)
          pathType: ImplementationSpecific
          backend:
            service:
              name: frontend
              port: 80
  tls:
    - secretName: todo-app-tls
      hosts:
        - todo-app.example.com

# Secrets for Production (use external secret management)
secrets:
  enabled: true
  postgresUser: ""  # Use external secret management
  postgresPassword: ""  # Use external secret management
  postgresDB: "todoapp"
  betterAuthSecret: ""  # Use external secret management
  openaiApiKey: ""  # Use external secret management

# Network Policy - Production strict
networkPolicy:
  enabled: true

# RBAC - Production
rbac:
  enabled: true
  serviceAccount:
    create: true
    name: phase3-production-sa
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT:role/phase3-role"

# Pod Disruption Budget
podDisruptionBudget:
  frontend:
    enabled: true
    minAvailable: 2
  backend:
    enabled: true
    minAvailable: 2
