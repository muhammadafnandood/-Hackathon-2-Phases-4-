{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "todo-app.serviceAccountName" . }}
  namespace: {{ include "todo-app.namespace" . }}
  labels:
    {{- include "todo-app.labels" . | nindent 4 }}
  {{- if .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml .Values.serviceAccount.annotations | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
---
{{- if and .Values.frontend.enabled .Values.frontend.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "todo-app.frontend.serviceAccountName" . }}
  namespace: {{ include "todo-app.namespace" . }}
  labels:
    {{- include "todo-app.frontend.labels" . | nindent 4 }}
  {{- if .Values.frontend.serviceAccount.annotations }}
  annotations:
    {{- toYaml .Values.frontend.serviceAccount.annotations | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
---
{{- if and .Values.backend.enabled .Values.backend.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "todo-app.backend.serviceAccountName" . }}
  namespace: {{ include "todo-app.namespace" . }}
  labels:
    {{- include "todo-app.backend.labels" . | nindent 4 }}
  {{- if .Values.backend.serviceAccount.annotations }}
  annotations:
    {{- toYaml .Values.backend.serviceAccount.annotations | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
---
{{- if and .Values.postgresql.enabled .Values.postgresql.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "todo-app.postgresql.serviceAccountName" . }}
  namespace: {{ include "todo-app.namespace" . }}
  labels:
    {{- include "todo-app.postgresql.labels" . | nindent 4 }}
  {{- if .Values.postgresql.serviceAccount.annotations }}
  annotations:
    {{- toYaml .Values.postgresql.serviceAccount.annotations | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
