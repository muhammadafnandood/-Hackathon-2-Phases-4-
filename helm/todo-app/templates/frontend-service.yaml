{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "todo-app.frontend.fullname" . }}
  namespace: {{ include "todo-app.namespace" . }}
  labels:
    {{- include "todo-app.frontend.labels" . | nindent 4 }}
  {{- if .Values.frontend.service.annotations }}
  annotations:
    {{- toYaml .Values.frontend.service.annotations | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.frontend.service.type }}
  {{- if .Values.frontend.service.nodePort }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.service.targetPort }}
      protocol: TCP
      name: http
      nodePort: {{ .Values.frontend.service.nodePort }}
  {{- else }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.service.targetPort }}
      protocol: TCP
      name: http
  {{- end }}
  selector:
    {{- include "todo-app.frontend.selectorLabels" . | nindent 4 }}
{{- end }}
