{{- if .Values.secrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "phase3.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Authentication Secret
  BETTER_AUTH_SECRET: {{ .Values.secrets.betterAuthSecret | quote }}
  
  # OpenAI API Key (optional)
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  
  # Database Credentials
  POSTGRES_USER: {{ .Values.postgresql.env.POSTGRES_USER | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.env.POSTGRES_PASSWORD | quote }}
  POSTGRES_DB: {{ .Values.postgresql.env.POSTGRES_DB | quote }}
  
  # Database Connection String
  DATABASE_URL: {{ include "phase3.databaseUrl" . | quote }}
{{- end }}
