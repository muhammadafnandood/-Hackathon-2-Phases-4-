# Default values for todo-app
# This is a YAML-formatted file.

# Global configuration
global:
  registry: ""
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

# Backend configuration
backend:
  name: backend
  image:
    repository: todo-backend
    tag: latest
    pullPolicy: IfNotPresent
  
  replicas: 2
  
  service:
    type: ClusterIP
    port: 3001
    targetPort: 3001
  
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"
  
  # Horizontal Pod Autoscaler
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 50
    targetMemoryUtilizationPercentage: 70
  
  # Health probes
  livenessProbe:
    httpGet:
      path: /health
      port: 3001
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  
  readinessProbe:
    httpGet:
      path: /ready
      port: 3001
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  
  # Environment variables
  env:
    - name: PORT
      value: "3001"
    - name: NODE_ENV
      value: "production"

# Frontend configuration
frontend:
  name: frontend
  image:
    repository: todo-frontend
    tag: latest
    pullPolicy: IfNotPresent
  
  replicas: 2
  
  service:
    type: NodePort
    port: 80
    targetPort: 3000
    nodePort: 30080
  
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"
  
  # Health probes
  livenessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  
  readinessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  
  # Environment variables
  env:
    - name: NEXT_PUBLIC_API_URL
      value: "http://backend-service:3001"
    - name: NODE_ENV
      value: "production"

# Ingress configuration (optional)
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: todo.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ConfigMap for shared configuration
configMap:
  enabled: true
  data:
    APP_NAME: "Cloud-Native Todo App"
    APP_VERSION: "1.0.0"
