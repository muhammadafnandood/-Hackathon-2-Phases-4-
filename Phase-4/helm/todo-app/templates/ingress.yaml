{{- if .Values.ingress.enabled -}}
{{- $fullName := include "todo-app.fullname" . -}}
{{- $frontendFullname := include "todo-app.frontend.fullname" . -}}
{{- $backendFullname := include "todo-app.backend.fullname" . -}}
{{- $ingressApiVersion := include "todo-app.ingress.apiVersion" . -}}
apiVersion: {{ $ingressApiVersion }}
kind: Ingress
metadata:
  name: {{ $fullName }}-ingress
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "todo-app.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            {{- if eq $ingressApiVersion "networking.k8s.io/v1" }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ if eq .backend.service "frontend" }}{{ $frontendFullname }}{{ else }}{{ $backendFullname }}{{ end }}
                port:
                  number: {{ .backend.port }}
            {{- else }}
            backend:
              serviceName: {{ if eq .backend.service "frontend" }}{{ $frontendFullname }}{{ else }}{{ $backendFullname }}{{ end }}
              servicePort: {{ .backend.port }}
            {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
