          "pluginVersion": "10.0.0",
          "targets": [
            {
              "expr": "sum(rate(kube_pod_container_status_restarts_total{namespace=\"{{ .Values.global.namespace }}\"}[15m]) * 60 * 5)",
              "legendFormat": "Crash Loops",
              "refId": "A"
            }
          ],
          "title": "Pod Restarts (5m)",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
