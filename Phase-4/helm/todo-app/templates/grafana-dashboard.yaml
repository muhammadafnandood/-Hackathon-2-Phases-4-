            {
              "expr": "avg(container_memory_usage_bytes{namespace=\"{{ .Values.global.namespace }}\", container!=\"\"} / container_spec_memory_limit_bytes{namespace=\"{{ .Values.global.namespace }}\", container!=\"\"} * 100)",
              "legendFormat": "Memory Usage",
              "refId": "A"
            }
          ],
          "title": "Average Memory Usage",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
