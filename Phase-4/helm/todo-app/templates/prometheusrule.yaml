{{- if and .Values.monitoring.enabled .Values.monitoring.prometheusRules.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "todo-app.fullname" . }}-alerts
  namespace: {{ .Values.monitoring.namespace | default .Values.global.namespace }}
  labels:
    {{- include "todo-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
    {{- with .Values.monitoring.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: todo-app.rules
      interval: 30s
      rules:
        # Pod CrashLooping Alert
        {{- if .Values.monitoring.prometheusRules.alerts.podCrashLooping }}
        - alert: TodoAppPodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace="{{ .Values.global.namespace }}"}[15m]) * 60 * 5 > 0
          for: 5m
          labels:
            severity: critical
            app: todo-app
          annotations:
            summary: "Pod is crash looping"
            description: "Pod {{ "{{" }} $labels.pod {{ "}}" }} in namespace {{ "{{" }} $labels.namespace {{ "}}" }} is restarting frequently"
            runbook_url: "https://github.com/hackathon/todo-chatbot/blob/main/RUNBOOK.md#pod-crashlooping"
        {{- end }}

        # High Memory Usage Alert
        {{- if .Values.monitoring.prometheusRules.alerts.highMemoryUsage }}
        - alert: TodoAppHighMemoryUsage
          expr: |
            (container_memory_usage_bytes{namespace="{{ .Values.global.namespace }}", container!=""} 
            / container_spec_memory_limit_bytes{namespace="{{ .Values.global.namespace }}", container!=""}) * 100 > 85
          for: 5m
          labels:
            severity: warning
            app: todo-app
          annotations:
            summary: "High memory usage detected"
            description: "Container {{ "{{" }} $labels.container {{ "}}" }} in pod {{ "{{" }} $labels.pod {{ "}}" }} memory usage is above 85%"
            runbook_url: "https://github.com/hackathon/todo-chatbot/blob/main/RUNBOOK.md#high-memory"
        {{- end }}

        # High CPU Usage Alert
        {{- if .Values.monitoring.prometheusRules.alerts.highCPUUsage }}
        - alert: TodoAppHighCPUUsage
          expr: |
            (rate(container_cpu_usage_seconds_total{namespace="{{ .Values.global.namespace }}", container!=""}[5m]) 
            / container_spec_cpu_quota{namespace="{{ .Values.global.namespace }}", container!=""}) * 100000 > 80
          for: 5m
          labels:
            severity: warning
            app: todo-app
          annotations:
            summary: "High CPU usage detected"
            description: "Container {{ "{{" }} $labels.container {{ "}}" }} in pod {{ "{{" }} $labels.pod {{ "}}" }} CPU usage is above 80%"
            runbook_url: "https://github.com/hackathon/todo-chatbot/blob/main/RUNBOOK.md#high-cpu"
        {{- end }}

        # Service Down Alert
        {{- if .Values.monitoring.prometheusRules.alerts.serviceDown }}
        - alert: TodoAppServiceDown
          expr: |
            up{namespace="{{ .Values.global.namespace }}", job=~"todo-app-.*"} == 0
          for: 2m
          labels:
            severity: critical
            app: todo-app
          annotations:
            summary: "Todo App service is down"
            description: "Service {{ "{{" }} $labels.job {{ "}}" }} has been down for more than 2 minutes"
            runbook_url: "https://github.com/hackathon/todo-chatbot/blob/main/RUNBOOK.md#service-down"
        {{- end }}

        # Pod Not Ready Alert
        - alert: TodoAppPodNotReady
          expr: |
            kube_pod_status_ready{namespace="{{ .Values.global.namespace }}", condition="true"} == 0
          for: 5m
          labels:
            severity: warning
            app: todo-app
          annotations:
            summary: "Pod is not ready"
            description: "Pod {{ "{{" }} $labels.pod {{ "}}" }} in namespace {{ "{{" }} $labels.namespace {{ "}}" }} is not ready"
            runbook_url: "https://github.com/hackathon/todo-chatbot/blob/main/RUNBOOK.md#pod-not-ready"

        # Deployment Replicas Mismatch
        - alert: TodoAppDeploymentReplicasMismatch
          expr: |
            kube_deployment_spec_replicas{namespace="{{ .Values.global.namespace }}"} 
            != kube_deployment_status_replicas_available{namespace="{{ .Values.global.namespace }}"}
          for: 10m
          labels:
            severity: warning
            app: todo-app
          annotations:
            summary: "Deployment replicas mismatch"
            description: "Deployment {{ "{{" }} $labels.deployment {{ "}}" }} has not matched the expected number of replicas for longer than 10 minutes"
            runbook_url: "https://github.com/hackathon/todo-chatbot/blob/main/RUNBOOK.md#replicas-mismatch"

        # Ingress High Error Rate
        - alert: TodoAppIngressHighErrorRate
          expr: |
            (sum(rate(nginx_ingress_controller_requests{namespace="{{ .Values.global.namespace }}", status=~"5[0-9]{2}"}[5m])) 
            / sum(rate(nginx_ingress_controller_requests{namespace="{{ .Values.global.namespace }}"}[5m]))) * 100 > 5
          for: 5m
          labels:
            severity: critical
            app: todo-app
          annotations:
            summary: "High error rate on ingress"
            description: "Ingress error rate is above 5% (current value: {{ "{{" }} $value | printf \"%.2f" {{ "}}" }}%)"
            runbook_url: "https://github.com/hackathon/todo-chatbot/blob/main/RUNBOOK.md#high-error-rate"

        # HPA Max Replicas Reached
        - alert: TodoAppHPAMaxReplicasReached
          expr: |
            kube_horizontalpodautoscaler_status_current_replicas{namespace="{{ .Values.global.namespace }}"} 
            == kube_horizontalpodautoscaler_spec_max_replicas{namespace="{{ .Values.global.namespace }}"}
          for: 5m
          labels:
            severity: warning
            app: todo-app
          annotations:
            summary: "HPA has reached maximum replicas"
            description: "HPA {{ "{{" }} $labels.horizontalpodautoscaler {{ "}}" }} has reached maximum number of replicas"
            runbook_url: "https://github.com/hackathon/todo-chatbot/blob/main/RUNBOOK.md#hpa-max-replicas"
{{- end }}
