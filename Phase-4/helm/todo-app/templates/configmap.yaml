apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "todo-app.fullname" . }}-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "todo-app.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.configMap.data }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- if .Values.frontend.enabled }}
  FRONTEND_SERVICE_HOST: {{ include "todo-app.frontend.fullname" . }}
  FRONTEND_SERVICE_PORT: {{ .Values.frontend.service.port | quote }}
  {{- end }}
  {{- if .Values.backend.enabled }}
  BACKEND_SERVICE_HOST: {{ include "todo-app.backend.fullname" . }}
  BACKEND_SERVICE_PORT: {{ .Values.backend.service.port | quote }}
  {{- end }}
